name: Test

on:
  push:
  pull_request:

jobs:
  test-hexagony:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.2'
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build hexagony image
        run: docker buildx bake hexagony --load

      - name: Run hexagony tests
        run: bundle exec rspec -t box_id:hexagony
