name: reversed-c
link: "https://github.com/cookie-s/reversed-c"
parent: ruby
disasm: true
tests:
  hello:
    file: hello.rev-c
    expected: "Hello, World!"
  cat:
    file: cat.rev-c
    stdin: meow
    expected: meow
  disasm:
    file: hello.rev-c
    options: -d
    expected_file: hello.rev-c.c
credits:
  hello.rev-c: Original
  hello.rev-c.c: "Generated from hello.rev-c"
  cat.rev-c: Original
